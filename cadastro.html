<!DOCTYPE html>
<html>

    <head>
        <meta charset="UTF-8">
        <title>Cadastro Dose+</title>
        <link rel="stylesheet" href="css/estilo.css">
    </head>

    <body>
        <div class="container">

        <h1 class="cadastrodose">Cadastro Dose+</h1>

        <form>
        <label for="nome">Primeiro Nome:</label>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome">

        <label for="sobrenome">Segundo Nome:</label>
        <input type="text" id="sobrenome" name="sobrenome" placeholder="Digite seu segundo nome">

        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" placeholder="Digite seu e-mail">

        <label for="numero">Telefone:</label>
        <input type="tel" id="numero" name="numero" placeholder="Digite seu telefone">

        <label for="cpf">CPF:</label>
        <input type="text" id="cpf" name="cpf" placeholder="Digite seu CPF">

        <button type="submit">CONTINUAR</button>
        </form>
        
        </div>
    </body>

</html>
